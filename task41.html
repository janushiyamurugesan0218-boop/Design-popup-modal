<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Modal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* Open Button */
.open-btn{
    padding:15px 30px;
    border:none;
    background:#fff;
    color:#333;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* Modal Background */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

/* Modal Box */
.modal-content{
    background:white;
    width:400px;
    max-width:90%;
    padding:30px;
    border-radius:15px;
    text-align:center;
    animation:popup 0.3s ease;
}

.modal-content h2{
    margin-bottom:15px;
}

.modal-content p{
    color:#666;
    margin-bottom:20px;
}

.close-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

.close-btn:hover{
    background:#dc2626;
}

@keyframes popup{
    from{
        transform:scale(0.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<button class="open-btn" onclick="openModal()">
    Open Popup Modal
</button>

<div class="modal" id="popupModal">

    <div class="modal-content">
        <h2>🎉 Welcome!</h2>

        <p>
            This is a responsive popup modal created using
            HTML, CSS, and JavaScript.
        </p>

        <button class="close-btn" onclick="closeModal()">
            Close
        </button>
    </div>

</div>

<script>
function openModal(){
    document.getElementById("popupModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("popupModal").style.display = "none";
}

window.onclick = function(event){
    let modal = document.getElementById("popupModal");

    if(event.target == modal){
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
